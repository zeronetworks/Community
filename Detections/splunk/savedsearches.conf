# Zero Networks - Splunk Saved Searches
# Covers: Lateral Movement, Ransomware Precursors, C2 / Exfiltration, Privilege & Credential Abuse
# Last modified: 2026-05-03
#
# Installation:
#   Copy to $SPLUNK_HOME/etc/apps/<your_app>/local/savedsearches.conf
#   or import via Splunk UI (Settings > Searches, reports, and alerts).
#
# Prerequisites:
#   1. KV Store collections defined in collections.conf (see below)
#   2. Lookup definitions in transforms.conf (see below)
#   3. Sourcetypes: zn:network, zn:rpc configured in props.conf
#   4. Run all baseline searches for 14+ days before enabling alert searches.
#   5. Macro definitions in macros.conf - the alert searches below call named macros
#      (e.g. `zn_new_internal_asset_pair`). Copy the body of each corresponding .spl
#      file into macros.conf as the named macro definition, for example:
#
#        [zn_new_internal_asset_pair]
#        definition = <paste contents of lateral_movement/new_internal_asset_pair.spl>
#
#      Alternatively, replace the macro call in each search= line with the SPL inline.
#
# Required collections.conf entries:
#   [zn_known_asset_pairs]
#   field.src_asset_id = string
#   field.dst_asset_id = string
#
#   [zn_known_workstation_ports]
#   field.src_asset_id = string
#   field.dst_port     = string
#
#   [zn_known_rpc_pairs]
#   field.src_asset_id   = string
#   field.dst_asset_id   = string
#   field.operation_name = string
#
# Required transforms.conf entries:
#   [zn_known_asset_pairs]
#   collection = zn_known_asset_pairs
#   external_type = kvstore
#   fields_list = _key,src_asset_id,dst_asset_id
#
#   [zn_known_workstation_ports]
#   collection = zn_known_workstation_ports
#   external_type = kvstore
#   fields_list = _key,src_asset_id,dst_port
#
#   [zn_known_rpc_pairs]
#   collection = zn_known_rpc_pairs
#   external_type = kvstore
#   fields_list = _key,src_asset_id,dst_asset_id,operation_name
#
#   [zn_known_smb_sources]
#   collection = zn_known_smb_sources
#   external_type = kvstore
#   fields_list = _key,src_asset_id
#
#   [zn_known_external_pairs]
#   collection = zn_known_external_pairs
#   external_type = kvstore
#   fields_list = _key,src_asset_id,dst_ip
#
#   [zn_known_cloud_pairs]
#   collection = zn_known_cloud_pairs
#   external_type = kvstore
#   fields_list = _key,src_asset_id,cloud_provider

# =============================================================================
# BASELINE BUILDERS (schedule before enabling alert searches)
# =============================================================================

[ZN - Baseline - Known Asset Pairs]
search = index=zeronetworks sourcetype="zn:network" earliest=-14d@d latest=now \
    | spath output=traffic_type  path="TrafficType" \
    | spath output=src_asset_id  path="Src.AssetID" \
    | spath output=dst_asset_id  path="Dst.AssetID" \
    | where traffic_type="Internal" \
        AND isnotnull(src_asset_id) AND src_asset_id!="" \
        AND isnotnull(dst_asset_id) AND dst_asset_id!="" \
    | stats count by src_asset_id dst_asset_id \
    | table src_asset_id dst_asset_id \
    | outputlookup zn_known_asset_pairs
cron_schedule = 0 2 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known asset pairs baseline (used by new_internal_asset_pair detection). Schedule: daily at 02:00.

[ZN - Baseline - Known Workstation Lateral Ports]
search = index=zeronetworks sourcetype="zn:network" earliest=-14d@d latest=now \
    | spath output=traffic_type   path="TrafficType" \
    | spath output=src_asset_id   path="Src.AssetID" \
    | spath output=src_asset_type path="Src.AssetType" \
    | spath output=dst_port       path="Dst.Port" \
    | where traffic_type="Internal" AND src_asset_type="Workstation" \
        AND isnotnull(src_asset_id) AND src_asset_id!="" \
        AND dst_port IN("22","135","139","389","445","636","3389","5985","5986") \
    | stats count by src_asset_id dst_port \
    | table src_asset_id dst_port \
    | outputlookup zn_known_workstation_ports
cron_schedule = 15 2 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known workstation lateral ports baseline (used by first_smb_rdp_winrm detection). Schedule: daily at 02:15.

[ZN - Baseline - Known RPC Pairs]
search = index=zeronetworks sourcetype="zn:rpc" earliest=-14d@d latest=now \
    | spath output=operation_name path="Operation.Name" \
    | spath output=src_asset_id   path="Src.AssetID" \
    | spath output=dst_asset_id   path="Dst.AssetID" \
    | where operation_name IN( \
        "ITaskSchedulerService","IWbemServices","winreg", \
        "drsuapi","samr","svcctl") \
        AND isnotnull(src_asset_id) AND src_asset_id!="" \
        AND isnotnull(dst_asset_id) AND dst_asset_id!="" \
    | stats count by src_asset_id dst_asset_id operation_name \
    | table src_asset_id dst_asset_id operation_name \
    | outputlookup zn_known_rpc_pairs
cron_schedule = 30 2 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known RPC pairs baseline (used by rpc_new_pair detection). Schedule: daily at 02:30.

# =============================================================================
# ALERT SEARCHES
# =============================================================================

[ZN - Alert - New Internal Asset Pair]
search = `zn_new_internal_asset_pair`
cron_schedule = 0 * * * *
dispatch.earliest_time = -65m@m
dispatch.latest_time = now
enableSched = 1
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = src_asset_id,dst_asset_id
counttype = number of events
relation = greater than
quantity = 0
description = Alerts when two internal ZN-managed assets communicate for the first time (not seen in 14d baseline). MITRE T1021.*.

[ZN - Alert - Internal Port Fanout]
search = `zn_internal_port_fanout`
cron_schedule = */10 * * * *
