alert.severity = 2
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = src_asset_id
counttype = number of events
relation = greater than
quantity = 0
description = Alerts when a single source connects to 20+ distinct internal destinations in 10 minutes. MITRE T1046.

