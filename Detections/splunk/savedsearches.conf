# =============================================================================
# RANSOMWARE PRECURSOR BASELINES
# =============================================================================

[ZN - Baseline - Known SMB Sources]
search = index=zeronetworks sourcetype="zn:network" earliest=-14d@d latest=now \
    | spath output=traffic_type path="TrafficType" \
    | spath output=dst_port     path="Dst.Port" \
    | spath output=src_asset_id path="Src.AssetID" \
    | where traffic_type="Internal" \
        AND (dst_port="445" OR dst_port="139") \
        AND isnotnull(src_asset_id) AND src_asset_id!="" \
    | stats count by src_asset_id \
    | table src_asset_id \
    | outputlookup zn_known_smb_sources
cron_schedule = 45 2 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known SMB sources baseline (used by mass_write_to_shares detection). Schedule: daily at 02:45.

# =============================================================================
# C2 / EXFIL BASELINES
# =============================================================================

[ZN - Baseline - Known External Pairs]
search = index=zeronetworks sourcetype="zn:network" earliest=-14d@d latest=now \
    | spath output=traffic_type path="TrafficType" \
    | spath output=src_asset_id path="Src.AssetID" \
    | spath output=dst_ip       path="Dst.IP" \
    | where traffic_type="External" \
        AND isnotnull(src_asset_id) AND src_asset_id!="" \
        AND isnotnull(dst_ip) AND dst_ip!="" \
    | stats count by src_asset_id dst_ip \
    | table src_asset_id dst_ip \
    | outputlookup zn_known_external_pairs
cron_schedule = 0 3 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known external destination pairs baseline (used by first_external_destination detection). Schedule: daily at 03:00.

[ZN - Baseline - Known Cloud Pairs]
search = index=zeronetworks sourcetype="zn:network" earliest=-14d@d latest=now \
    | spath output=traffic_type path="TrafficType" \
    | spath output=src_asset_id path="Src.AssetID" \
    | spath output=dst_fqdn     path="Dst.Fqdn" \
    | where traffic_type="External" AND src_asset_id!="" AND dst_fqdn!="" \
        AND (match(dst_fqdn, "(?i)(dropbox|mega|google|onedrive|1drv|sharepoint|box\.com|wetransfer|we\.tl|send\.firefox|gofile|anonfiles)")) \
    | eval cloud_provider=case( \
        match(dst_fqdn,"(?i)dropbox"),"Dropbox", \
        match(dst_fqdn,"(?i)mega"),"MEGA", \
        match(dst_fqdn,"(?i)google"),"Google Drive", \
        match(dst_fqdn,"(?i)(onedrive|1drv)"),"OneDrive", \
        match(dst_fqdn,"(?i)sharepoint"),"SharePoint", \
        match(dst_fqdn,"(?i)box\.com"),"Box", \
        match(dst_fqdn,"(?i)(wetransfer|we\.tl)"),"WeTransfer", \
        true(),"Other Cloud Storage") \
    | stats count by src_asset_id cloud_provider \
    | table src_asset_id cloud_provider \
    | outputlookup zn_known_cloud_pairs
cron_schedule = 15 3 * * *
dispatch.earliest_time = -14d@d
dispatch.latest_time = now
enableSched = 1
description = Refreshes the ZN known cloud storage access pairs baseline (used by cloud_storage_connection detection). Schedule: daily at 03:15.

